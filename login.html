<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - BIT Lab Tecnologici</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #FF6B35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 53, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border-left: 4px solid #dc2626;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border-left: 4px solid #10b981;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.85rem;
        }

        .footer a {
            color: #FF6B35;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h1>🤖 BIT - Lab Tecnologici</h1>
        <p>Accesso Gestionale</p>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                placeholder="admin@bitcorsi.it"
                required
                autocomplete="email"
            >
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Inserisci la password"
                required
                autocomplete="current-password"
            >
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
            <span id="btnText">🔓 Accedi</span>
        </button>
    </form>

    <div class="footer">
        <p>Gestionale riservato agli amministratori</p>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js"></script>

<script>
// ============================================
// CONFIGURAZIONE FIREBASE
// ============================================
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID",
    measurementId: "YOUR_MEASUREMENT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ============================================
// CONTROLLA SE UTENTE È GIÀ LOGGATO
// ============================================
auth.onAuthStateChanged(user => {
    if (user) {
        // Utente loggato, reindirizza a /admin
        window.location.href = '/admin.html';
    }
});

// ============================================
// GESTIONE FORM LOGIN
// ============================================
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    // Nascondi messaggi precedenti
    errorMessage.classList.remove('show');
    successMessage.classList.remove('show');

    // Disabilita bottone
    loginBtn.disabled = true;
    btnText.innerHTML = '<span class="loading-spinner"></span> Accesso in corso...';

    try {
        // Login con Firebase
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        
        console.log('✅ Login riuscito:', userCredential.user.email);

        // Mostra messaggio di successo
        successMessage.textContent = '✅ Login riuscito! Reindirizzamento...';
        successMessage.classList.add('show');

        // Reindirizza dopo 1 secondo
        setTimeout(() => {
            window.location.href = '/admin.html';
        }, 1000);

    } catch (error) {
        console.error('❌ Errore login:', error);

        // Mostra errore appropriato
        let errorText = 'Errore durante il login';

        if (error.code === 'auth/user-not-found') {
            errorText = '❌ Utente non trovato';
        } else if (error.code === 'auth/wrong-password') {
            errorText = '❌ Password non corretta';
        } else if (error.code === 'auth/invalid-email') {
            errorText = '❌ Email non valida';
        } else if (error.code === 'auth/too-many-requests') {
            errorText = '❌ Troppi tentativi. Riprova più tardi.';
        } else if (error.code === 'auth/user-disabled') {
            errorText = '❌ Account disabilitato';
        }

        errorMessage.textContent = errorText;
        errorMessage.classList.add('show');

        // Riabilita bottone
        loginBtn.disabled = false;
        btnText.innerHTML = '🔓 Accedi';
    }
});

// ============================================
// LOGOUT
// ============================================
function logout() {
    auth.signOut().then(() => {
        console.log('✅ Logout effettuato');
        window.location.href = '/login.html';
    }).catch(error => {
        console.error('Errore logout:', error);
    });
}

// Rendi disponibile globalmente
window.logout = logout;
</script>

</body>
</html>
